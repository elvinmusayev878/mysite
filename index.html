<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elvin Cinema</title>

<style>

body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
}

header{
background:black;
padding:15px;
font-size:28px;
color:red;
text-align:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
padding:30px;
justify-content:center;
}

.card{
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card p{
padding:10px;
}

.player{
width:90%;
height:500px;
margin:auto;
display:block;
margin-top:20px;
}

</style>

</head>

<body>

<header>ELVIN CINEMA 🎬</header>

<iframe class="player"
src="https://vidsrc.to/embed/movie/tt4154796"
allowfullscreen></iframe>

<div class="grid" id="movies"></div>

<script>

const apiKey = "e19de15060a15796f5abd7546cd21dfe";

fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${apiKey}`)
.then(res => res.json())
.then(data => {

const moviesDiv = document.getElementById("movies");

data.results.forEach(movie => {

const card = document.createElement("div");
card.classList.add("card");

card.innerHTML = `
<img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
<p>${movie.title}</p>
`;

moviesDiv.appendChild(card);

});

});

</script>

</body>
</html>
