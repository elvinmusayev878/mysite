<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<meta name="google-site-verification" content="2gtmop4yiZyN0UpxSlv26PEexuZKG_ixNH4nkNScshU" />

<meta name="description" content="Türkçe dublaj ve altyazılı filmler izle">
<meta name="keywords" content="film izle, türkçe dublaj film, hd film izle">

<title>ELVIN CINEMA | Türkçe Film İzle</title>

<style>

body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
}

header{
background:black;
padding:20px;
font-size:28px;
color:red;
text-align:center;
font-weight:bold;
}

.search{
text-align:center;
margin:20px;
}

.search input{
padding:10px;
width:300px;
border:none;
border-radius:5px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
padding:30px;
justify-content:center;
}

.card{
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card p{
padding:10px;
text-align:center;
}

.player{
width:90%;
height:500px;
margin:auto;
display:block;
margin-top:20px;
}

</style>

</head>

<body>

<header>ELVIN CINEMA 🎬 Türkçe Filmler</header>

<div class="search">
<input type="text" id="search" placeholder="Film ara...">
</div>

<iframe id="player" class="player" allowfullscreen></iframe>

<div class="grid" id="movies"></div>

<script>

const API_KEY = "e19de15060a15796f5abd7546cd21dfe"
const IMG = "https://image.tmdb.org/t/p/w500"
const moviesDiv = document.getElementById("movies")

async function loadMovies(){

for(let page=1; page<=20; page++){

let res = await fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}&language=tr-TR&page=${page}`)
let data = await res.json()

data.results.forEach(movie=>{

let card = document.createElement("div")
card.className="card"

card.innerHTML = `
<img src="${IMG + movie.poster_path}">
<p>${movie.title}</p>
`

card.onclick = ()=>{
document.getElementById("player").src =
`https://vidsrc.to/embed/movie/${movie.id}`
}

moviesDiv.appendChild(card)

})

}

}

loadMovies()

document.getElementById("search").addEventListener("input", function(){

let value = this.value.toLowerCase()
let cards = document.querySelectorAll(".card")

cards.forEach(card=>{

let title = card.innerText.toLowerCase()

if(title.includes(value)){
card.style.display="block"
}else{
card.style.display="none"
}

})

})

</script>

<script src="https://pl28853240.effectivegatecpm.com/74/48/92/74489256fb3e2c3cf9460a8d8b5bbb80.js"></script>

</body>
</html>
