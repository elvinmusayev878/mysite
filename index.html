<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Elvin Cinema</title>

<style>

body{
margin:0;
background:#141414;
font-family:Arial;
color:white;
}

header{
background:black;
padding:15px;
font-size:28px;
color:red;
text-align:center;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,220px);
gap:20px;
padding:30px;
justify-content:center;
}

.card{
background:#1f1f1f;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
}

.card p{
padding:10px;
}

.player{
width:90%;
height:500px;
margin:auto;
display:block;
margin-top:20px;
}

</style>

</head>

<body>

<header>ELVIN CINEMA 🎬</header>

<iframe class="player"
src="https://vidsrc.to/embed/movie/tt4154796"
allowfullscreen></iframe>

<div class="grid">

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg">
<p>Avengers Endgame</p>
</div>

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg">
<p>Joker</p>
</div>

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/q719jXXEzOoYaps6babgKnONONX.jpg">
<p>Interstellar</p>
</div>

<div class="card">
<img src="https://image.tmdb.org/t/p/w500/fIE3lAGcZDV1G6XM5KmuWnNsPp1.jpg">
<p>Spider-Man</p>
</div>

</div>

</body>
</html>
